name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff, black, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alphadeck
          POSTGRES_PASSWORD: alphadeck
          POSTGRES_DB: alphadeck
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U alphadeck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://alphadeck:alphadeck@localhost:5544/alphadeck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Deps come from pyproject (single source); the dev extra pins the linters so CI matches local.
      - name: Install (editable + dev)
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format check)
        run: black --check .
      - name: Pytest
        run: pytest
