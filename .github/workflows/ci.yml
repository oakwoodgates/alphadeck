name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff, black, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alphadeck
          POSTGRES_PASSWORD: alphadeck
          POSTGRES_DB: alphadeck
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U alphadeck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://alphadeck:alphadeck@localhost:5544/alphadeck
      ALPHADECK_TEST_DB: alphadeck_test   # the per-worktree test-DB hook pins CI to a stable, demo-safe name
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"  # the declared floor (requires-python >=3.11); catches 3.11-only breaks
      # Deps come from pyproject (single source); the dev extra pins the linters so CI matches local. The
      # replay extra (duckdb + pyarrow) so the backtest-harness tests run here against the Postgres service.
      - name: Install (editable + dev + replay)
        run: pip install -e ".[dev,replay]"
      - name: OpenAPI contract is up to date
        # regenerate from the live app; fails if the committed openapi.json drifted from the code
        run: |
          python -m app.openapi_export
          git diff --exit-code openapi.json
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format check)
        run: black --check .
      - name: Pytest
        run: pytest

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: API types are up to date
        # regenerate from the committed openapi.json; fails if types.gen.ts drifted from the contract
        run: |
          npm run gen:api
          git diff --exit-code src/api/types.gen.ts
      - run: npm run build  # tsc -b (strict typecheck) + vite build
      - run: npm test  # vitest: the Workbench authoring components + the grouped-render coverage
