# Full Alpha Deck stack — one command: `docker compose up --build`.
# Postgres + the FastAPI backend (migrates + seeds the HIMS demo on start) + the SPA behind nginx.
#   App:  http://localhost:8080      API + Swagger docs:  http://localhost:8000/docs
# infra/docker-compose.yml stays the DB-only slice for the local backend dev loop; both share the
# same project name (alphadeck) and the pgdata volume, so the data is the same either way.
name: alphadeck

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: alphadeck
      POSTGRES_PASSWORD: alphadeck
      POSTGRES_DB: alphadeck
    ports:
      - "5544:5432" # non-default host port to avoid clashing with a local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphadeck"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Self-recover after a Docker daemon / VM / laptop restart. Without this, only the cron came back
    # and the rest of the stack stayed down until a hand-run `up` — on the laptop deploy that read as
    # "the platform is broken" every morning. `unless-stopped` honors an explicit `docker compose stop`.
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://alphadeck:alphadeck@postgres:5432/alphadeck
      # Live-feature secrets/config, injected from the gitignored `.env` (copy `.env.example`). Both are
      # FAIL-OPEN: no key -> the LLM seams return no draft/explanation; no UA -> the live SEC pull is
      # skipped. DATABASE_URL stays the in-network address on purpose (a `.env` DATABASE_URL is for the
      # local dev loop only; the container must always reach postgres:5432).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ALPHADECK_USER_AGENT: ${ALPHADECK_USER_AGENT:-}
      # Optional discovery BACKSTOP cap, exposed for tuning (unset -> 1000, the Settings default). NOT a recall
      # limiter — only a pathological-keyword bound; speed comes from the parallel EFTS fan-out under the shared
      # rate limit, never from capping recall. The fallback is 1000 (not empty) because an EMPTY env value
      # can't parse as an int — pydantic-settings treats "" as a value, not "unset", and would crash on boot.
      ALPHADECK_DISCOVERY_HIT_CAP: ${ALPHADECK_DISCOVERY_HIT_CAP:-1000}
      # The run-loader off-switch (a dev/test cost-saver: load a saved draft run instead of paying for a fresh
      # one). Unset -> False (the Settings default; the feature + its /runs endpoints are absent). Set
      # ALPHADECK_RUN_LOADER_ENABLED=true in `.env` to turn it on for the operator; the FE picker follows.
      # Fallback is `false` (NOT empty): an empty env value can't parse as a bool — pydantic-settings would crash
      # on boot (same trap as the hit-cap above).
      ALPHADECK_RUN_LOADER_ENABLED: ${ALPHADECK_RUN_LOADER_ENABLED:-false}
      # The notify DELIVERY channel (the Slack incoming-webhook). Unset -> the LogNotifier fallback (delivery
      # off; transitions still logged). Set SLACK_WEBHOOK_URL in `.env` to push the loud -> armed transitions.
      # Here on the backend too so a manual `docker exec ... python -m pipeline.daily` also delivers; the cron
      # sidecar (below) is the automated path.
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # The process wall-clock TIMEZONE. `date.today()` (the daily-cron asof, the scoreboard/master
      # "today") reads AMBIENT TZ; unset it defaults to UTC, so a manual `docker exec ... python -m
      # pipeline.daily` after ~20:00 ET records TOMORROW's asof — a different call, not a mislabel: the
      # asof is a LIVENESS PARAMETER, so a signal whose window closes that day is dropped and the derived
      # countdowns shift a day. Pin the trading-day zone here so a manual backend run agrees with the cron
      # sidecar (which already sets TZ). NOTE: this fixes the two CONTAINERS only — "today" is still
      # ambient-derived at 9 call sites; the durable fix is a shared market_today() on an explicit ZoneInfo
      # (logged, not built here).
      TZ: ${ALPHADECK_TZ:-America/New_York}
      # The cron's RUN_AT wall time, mirrored to the backend (Settings.cron_run_at) so the admin page's
      # staleness read models the SAME Mon-Fri+RUN_AT schedule the sidecar (below) actually runs — one
      # host var, no drift between the trigger and its readout.
      ALPHADECK_CRON_AT: ${ALPHADECK_CRON_AT:-22:30}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000" # the API direct (and Swagger docs at /docs)
    volumes:
      # The runtime-data home. The image puts the app at /app, so the code's `<repo-root>/data/...` cache
      # paths (ingest/edgar, ingest/prices, ingest/doe, securities) resolve to /data/... in the container.
      # Without this volume every `docker compose up --build` WIPED the EDGAR cache, so each Workbench draft
      # re-enumerated EFTS fully live — politeness cost + run-to-run index drift at the hit-cap boundary.
      # Also the home of the draft run log (/data/draft_runs — the DISCOVER run-of-record artifacts).
      - appdata:/data
      # The Scoreboard's replay-panel artifact (SCORE) — written by the HOST dev venv
      # (`python -m scoreboard.replay_snapshot`; replay needs the .[replay] extra the lean image
      # lacks), so this one subpath overlays the appdata volume with a READ-ONLY bind of the host
      # dir: the container serves the artifact but physically cannot write it.
      - ./data/scoreboard_replay:/data/scoreboard_replay:ro
      # Operator DB snapshots (Slice 4) — a WRITABLE host bind (the scoreboard_replay idiom minus :ro),
      # so a dump is copyable off-box + restorable with the documented `psql < ./data/backups/<f>`. On
      # BOTH backend (the button + the list) and cron (the nightly dump) so the two share ONE directory.
      - ./data/backups:/data/backups
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s # cover migrate + seed before failures count
    # Self-recover after a daemon/VM restart — and the reboot race: `depends_on` orders only the
    # INITIAL `up`, not restarts, so on a reboot the backend can beat postgres; the restart policy
    # retries until postgres is up and the healthcheck passes.
    restart: unless-stopped

  # The daily call-of-record cron — "the platform feeds itself" (M2d). ON BY DEFAULT: it comes up with the
  # normal `docker compose up`, so the platform notifies itself with no extra command to remember. (Local dev
  # uses infra/docker-compose.yml — DB only — and tests use pytest, so neither starts this; the full-stack
  # compose is the deployment, where the cron belongs. To skip it for one run: `docker compose up -d
  # --scale cron=0`.) Shares the backend image; the idempotent `pipeline.daily` CLI is the unit of work, this
  # sidecar is just the trigger (scripts/daily_cron.sh sleeps until the US-close time, then runs it).
  cron:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://alphadeck:alphadeck@postgres:5432/alphadeck
      ALPHADECK_USER_AGENT: ${ALPHADECK_USER_AGENT:-} # the daily run does LIVE EDGAR/Yahoo pulls
      TZ: ${ALPHADECK_CRON_TZ:-America/New_York} # explicit TZ — schedule at US market close, never UTC
      RUN_AT: ${ALPHADECK_CRON_AT:-22:30} # HH:MM in TZ — after the US close + EOD settle
      # No ANTHROPIC_API_KEY: ingest + the call engine are deterministic — no LLM on this path.
      # The notify delivery channel — this is the AUTOMATED path that fires the daily -> armed push. Unset ->
      # LogNotifier (transitions logged, not delivered); set SLACK_WEBHOOK_URL in `.env` to push to Slack.
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      backend:
        condition: service_healthy # the API migrates + seeds on start; the cron needs the ready DB
    volumes:
      - appdata:/data # the SAME runtime-data home as the backend — the daily ingest shares the caches
      # Slice 4 — the SAME host backups dir the backend lists from: the nightly dump runs HERE (in cron),
      # the list runs in backend, so both MUST bind this or the backend never sees the nightly snapshots.
      - ./data/backups:/data/backups
    command: ["sh", "/app/scripts/daily_cron.sh"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80" # the app
    restart: unless-stopped # match the rest of the stack — the SPA comes back after a reboot too

volumes:
  pgdata:
  appdata: # /data in backend + cron: the EDGAR/price/DOE/FIGI/SEC caches + draft_runs, kept across rebuilds
