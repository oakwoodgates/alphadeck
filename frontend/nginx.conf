# Serve the built SPA and reverse-proxy the API to the backend service. Single origin -> no CORS,
# which matches the app's relative baseUrl "/" (see src/api/client.ts).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The API surface (theses + workbench + health) is proxied to the backend container by its compose
    # name. Keep this in sync with the dev proxy in vite.config.ts.
    location /theses {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /workbench {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        # The draft-chain research pass (Opus + web search) runs for minutes; the default 60s read timeout would
        # 504 mid-call and the client would re-fire it (the $8-and-nothing amplification). Hold the upstream
        # connection long enough for one pass to finish — kept in concert with llm_research_timeout_s (300s).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location /scoreboard {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
