# Serve the built SPA and reverse-proxy the API to the backend service. Single origin -> no CORS,
# which matches the app's relative baseUrl "/" (see src/api/client.ts).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The API surface, consolidated under /api (see src/api/client.ts). The trailing slash on
    # proxy_pass strips the prefix — /api/theses hits the backend as /theses — so the backend and
    # the OpenAPI contract never carry it. Keep in sync with the dev proxy in vite.config.ts.
    # The 300s timeouts exist for the workbench draft-chain research pass (Opus + web search, runs
    # minutes; a 60s default would 504 mid-call and the client would re-fire — the $8-and-nothing
    # amplification), kept in concert with llm_research_timeout_s. They are a ceiling, not a delay,
    # now shared by the whole API surface.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
