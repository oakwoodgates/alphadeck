<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Deck — Board + Cockpit Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08090b;
    --bg-2:#0c0e12;
    --panel:#101318;
    --panel-2:#141821;
    --line:#1e232c;
    --line-2:#2a313c;
    --txt:#e7eaef;
    --txt-2:#9aa3b0;
    --txt-3:#5a6470;
    --txt-4:#3c4450;

    --incub:#586374;     /* dormant slate */
    --warm:#e0a23c;      /* amber */
    --armed:#ff5733;     /* ember */
    --manage:#34c2a0;    /* teal */
    --pos:#46d07f;
    --neg:#ff5a6a;

    --mono:"JetBrains Mono",ui-monospace,monospace;
    --sans:"Archivo",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,87,51,.05), transparent 60%),
      radial-gradient(900px 500px at -5% 110%, rgba(52,194,160,.04), transparent 60%),
      var(--bg);
    color:var(--txt);
    font-family:var(--sans);
    font-size:13px;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  /* subtle grid texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
    background-size:42px 42px;mask-image:radial-gradient(circle at 50% 40%,#000,transparent 90%);
  }
  .app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

  /* ===== top bar ===== */
  .topbar{
    height:46px;flex:0 0 auto;display:flex;align-items:center;gap:22px;
    padding:0 18px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--bg-2),var(--bg));
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.16em;font-size:12px}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--armed);box-shadow:0 0 10px var(--armed);transform:rotate(45deg)}
  .brand small{color:var(--txt-3);font-weight:600;letter-spacing:.18em}
  .nav{display:flex;gap:4px;margin-left:6px}
  .nav a{
    font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--txt-3);padding:6px 11px;border-radius:6px;text-decoration:none;cursor:pointer;
  }
  .nav a.on{color:var(--txt);background:var(--panel-2)}
  .nav a.stub{opacity:.45}
  .nav a.stub::after{content:" ·";color:var(--txt-4)}
  .topbar .spacer{flex:1}
  .clock{font-family:var(--mono);font-size:11px;color:var(--txt-3);letter-spacing:.04em}
  .demo-pill{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--warm);
    border:1px solid rgba(224,162,60,.35);border-radius:20px;padding:3px 9px;background:rgba(224,162,60,.06)}

  /* ===== decision queue ===== */
  .dq{
    flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:9px 18px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(90deg,rgba(255,87,51,.07),rgba(255,87,51,.02) 60%,transparent);
  }
  .dq-label{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;
    letter-spacing:.15em;text-transform:uppercase;color:var(--armed);white-space:nowrap}
  .dq-label .pulse{width:7px;height:7px;border-radius:50%;background:var(--armed);
    box-shadow:0 0 0 0 rgba(255,87,51,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,87,51,.55)}70%{box-shadow:0 0 0 7px rgba(255,87,51,0)}100%{box-shadow:0 0 0 0 rgba(255,87,51,0)}}
  .dq-items{display:flex;gap:10px;flex:1;overflow:hidden}
  .dq-item{display:flex;align-items:center;gap:10px;padding:5px 12px;border:1px solid var(--line-2);
    border-radius:8px;background:var(--panel);cursor:pointer;white-space:nowrap;transition:.15s}
  .dq-item:hover{border-color:var(--armed);background:var(--panel-2)}
  .dq-item b{font-family:var(--mono);font-weight:700;font-size:12px}
  .dq-item .g{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:4px}
  .dq-item span{color:var(--txt-2);font-size:11.5px}
  .dq-empty{color:var(--txt-3);font-size:11px}

  /* ===== board ===== */
  .board{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:0;overflow:hidden}
  .col{display:flex;flex-direction:column;border-right:1px solid var(--line);min-width:0;overflow:hidden}
  .col:last-child{border-right:none}
  .col-head{padding:12px 15px 9px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line)}
  .col-head .swatch{width:10px;height:10px;border-radius:2px}
  .col-head h2{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}
  .col-head .n{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--txt-3);
    border:1px solid var(--line-2);border-radius:20px;padding:1px 8px}
  .col-head .hint{font-size:9.5px;color:var(--txt-4);letter-spacing:.04em}
  .col-body{flex:1;overflow-y:auto;padding:12px 12px 40px;display:flex;flex-direction:column;gap:11px}

  /* energy gradient per column background */
  .col.incub .col-head{background:rgba(88,99,116,.03)}
  .col.warm .col-head{background:rgba(224,162,60,.05)}
  .col.armed .col-head{background:rgba(255,87,51,.07)}
  .col.manage .col-head{background:rgba(52,194,160,.05)}
  .col.incub .swatch{background:var(--incub)} .col.incub h2{color:var(--incub)}
  .col.warm .swatch{background:var(--warm)} .col.warm h2{color:var(--warm)}
  .col.armed .swatch{background:var(--armed);box-shadow:0 0 8px var(--armed)} .col.armed h2{color:var(--armed)}
  .col.manage .swatch{background:var(--manage)} .col.manage h2{color:var(--manage)}

  /* ===== cards: loudness scales with state ===== */
  .card{position:relative;border-radius:10px;padding:13px 14px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);transition:transform .14s,border-color .14s,background .14s;
    opacity:0;transform:translateY(8px);animation:rise .5s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-2px)}
  .card .tk{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.02em}
  .card .nm{font-weight:600;font-size:13.5px;margin:2px 0 8px;line-height:1.25}
  .card .desc{color:var(--txt-2);font-size:11.5px;line-height:1.4;margin-bottom:10px}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .tag{font-size:9.5px;letter-spacing:.05em;color:var(--txt-3);border:1px solid var(--line-2);
    border-radius:5px;padding:2px 6px;text-transform:uppercase;font-weight:600}
  .card .foot{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10.5px;color:var(--txt-3)}
  .readiness{display:flex;align-items:center;gap:6px;margin-left:auto}
  .pips{display:flex;gap:3px}
  .pip{width:13px;height:4px;border-radius:2px;background:var(--line-2)}
  .pip.on{background:var(--txt-2)}

  /* incubating — dormant, low energy */
  .col.incub .card{background:rgba(16,19,24,.5);border-color:rgba(30,35,44,.7)}
  .col.incub .card .nm{color:var(--txt-2);font-weight:500}
  .col.incub .card .tk{color:var(--txt-3)}
  .col.incub .card .desc{color:var(--txt-3);font-size:11px}
  .col.incub .card:hover{border-color:var(--incub)}

  /* warming — gentle glow */
  .col.warm .card{border-left:2px solid var(--warm);box-shadow:inset 1px 0 12px -8px var(--warm)}
  .col.warm .card:hover{border-color:var(--warm);background:rgba(224,162,60,.04)}
  .col.warm .pip.on{background:var(--warm)}

  /* armed — loud, pulsing call */
  .col.armed .card{border:1px solid rgba(255,87,51,.55);background:linear-gradient(180deg,rgba(255,87,51,.06),var(--panel));
    box-shadow:0 0 22px -10px rgba(255,87,51,.5)}
  .col.armed .card:hover{border-color:var(--armed);box-shadow:0 0 30px -8px rgba(255,87,51,.6)}
  .col.armed .card .nm{color:var(--txt)}
  .col.armed .pip.on{background:var(--armed)}
  .call-flag{position:absolute;top:11px;right:12px;display:flex;align-items:center;gap:5px;
    font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--armed)}
  .call-flag .b{width:6px;height:6px;border-radius:50%;background:var(--armed);animation:pulse 2s infinite}

  /* managing — steady instrument */
  .col.manage .card{border-left:2px solid var(--manage)}
  .col.manage .card:hover{border-color:var(--manage)}

  .grade{font-size:9px;font-weight:800;letter-spacing:.1em;padding:2px 7px;border-radius:5px}
  .grade.flip{color:var(--warm);background:rgba(224,162,60,.12);border:1px solid rgba(224,162,60,.4)}
  .grade.core{color:var(--armed);background:rgba(255,87,51,.12);border:1px solid rgba(255,87,51,.45)}
  .countchip{font-family:var(--mono);font-size:10px;color:var(--manage);border:1px solid rgba(52,194,160,.35);
    border-radius:20px;padding:1px 8px;margin-left:auto}
  .pnl{font-family:var(--mono);font-weight:700}
  .pnl.up{color:var(--pos)} .pnl.down{color:var(--neg)}

  /* ===== cockpit ===== */
  .cockpit{position:absolute;inset:0;z-index:5;background:var(--bg);display:none;flex-direction:column;
    animation:slidein .28s cubic-bezier(.2,.7,.2,1)}
  @keyframes slidein{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .cockpit.show{display:flex}
  .cp-top{height:52px;flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--bg-2)}
  .back{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--txt-2);
    cursor:pointer;border:1px solid var(--line-2);border-radius:7px;padding:6px 11px;background:var(--panel)}
  .back:hover{border-color:var(--txt-3);color:var(--txt)}
  .cp-title{display:flex;align-items:center;gap:11px}
  .cp-title .tk{font-family:var(--mono);font-weight:700;font-size:15px}
  .cp-title h1{font-size:15px;font-weight:700}
  .state-badge{font-size:9.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;padding:3px 9px;border-radius:6px}

  .cp-body{flex:1;display:grid;grid-template-columns:1fr 360px;overflow:hidden}
  .cp-main{overflow-y:auto;padding:22px 26px 60px}
  .cp-rail{border-left:1px solid var(--line);background:var(--bg-2);overflow-y:auto;padding:20px 20px 60px}

  .sect{margin-bottom:26px}
  .sect-h{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--txt-3);
    margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .sect-h::after{content:"";flex:1;height:1px;background:var(--line)}

  .narrative{font-size:14px;line-height:1.6;color:var(--txt);border-left:2px solid var(--line-2);
    padding:2px 0 2px 15px;font-style:italic}
  .narrative .by{display:block;font-style:normal;font-size:10.5px;letter-spacing:.08em;color:var(--txt-4);margin-top:9px;text-transform:uppercase}

  table.basket{width:100%;border-collapse:collapse;font-size:12px}
  table.basket th{text-align:left;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-4);
    font-weight:600;padding:0 10px 8px 0;border-bottom:1px solid var(--line)}
  table.basket td{padding:9px 10px 9px 0;border-bottom:1px solid var(--line);vertical-align:middle}
  table.basket .tk{font-family:var(--mono);font-weight:700}
  table.basket .role{color:var(--txt-2);font-size:11px}
  .arch{font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:5px;text-transform:uppercase;white-space:nowrap}
  .arch.leader{color:#8ab4ff;background:rgba(138,180,255,.1);border:1px solid rgba(138,180,255,.25)}
  .arch.beta{color:var(--armed);background:rgba(255,87,51,.1);border:1px solid rgba(255,87,51,.28)}
  .arch.lotto{color:var(--warm);background:rgba(224,162,60,.1);border:1px solid rgba(224,162,60,.28)}
  .arch.shovel{color:var(--manage);background:rgba(52,194,160,.1);border:1px solid rgba(52,194,160,.28)}
  .met{font-family:var(--mono);font-size:11.5px;color:var(--txt-2);text-align:right}

  .ev,.cat{display:flex;align-items:center;gap:11px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;
    margin-bottom:7px;background:var(--panel);cursor:pointer;transition:.14s}
  .ev:hover,.cat:hover{border-color:var(--line-2);background:var(--panel-2)}
  .ev .typ{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--txt);
    background:var(--panel-2);border:1px solid var(--line-2);border-radius:5px;padding:2px 7px;white-space:nowrap}
  .ev .lbl{flex:1;font-size:12px;color:var(--txt-2)}
  .ev .dt,.cat .dt{font-family:var(--mono);font-size:10.5px;color:var(--txt-4)}
  .ev .arrow,.cat .arrow{color:var(--txt-4)}
  .cat .when{font-family:var(--mono);font-size:11px;font-weight:700;width:62px}
  .cat .lbl{flex:1;font-size:12px;color:var(--txt-2)}
  .cat .kind{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-4)}
  .cat.soon .when{color:var(--armed)}

  .kill{font-size:12px;color:var(--txt-2);line-height:1.55;display:flex;gap:9px;margin-bottom:7px}
  .kill::before{content:"⊘";color:var(--neg);font-size:12px;margin-top:1px}

  /* ===== call card (rail) ===== */
  .callcard{border-radius:12px;overflow:hidden}
  .cc-armed{border:1px solid rgba(255,87,51,.5);box-shadow:0 0 34px -16px rgba(255,87,51,.7)}
  .cc-warm{border:1px solid rgba(224,162,60,.4)}
  .cc-manage{border:1px solid rgba(52,194,160,.4)}
  .cc-incub{border:1px solid var(--line-2)}
  .cc-head{padding:13px 15px;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
    display:flex;align-items:center;justify-content:space-between}
  .cc-armed .cc-head{background:linear-gradient(90deg,rgba(255,87,51,.18),rgba(255,87,51,.05));color:var(--armed)}
  .cc-warm .cc-head{background:rgba(224,162,60,.1);color:var(--warm)}
  .cc-manage .cc-head{background:rgba(52,194,160,.1);color:var(--manage)}
  .cc-incub .cc-head{background:var(--panel-2);color:var(--txt-3)}
  .cc-body{padding:15px;background:var(--panel)}
  .verdict{font-size:18px;font-weight:800;line-height:1.2;margin-bottom:4px}
  .verdict.armed{color:var(--armed)} .verdict.warm{color:var(--warm)} .verdict.manage{color:var(--manage)}
  .verdict.incub{color:var(--txt-2);font-size:15px}
  .vsub{font-size:12px;color:var(--txt-2);line-height:1.45;margin-bottom:14px}
  .vsub b{color:var(--txt);font-family:var(--mono)}

  .conf{margin-bottom:15px}
  .conf-row{display:flex;justify-content:space-between;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-4);margin-bottom:5px}
  .conf-bar{height:5px;border-radius:3px;background:var(--line);overflow:hidden}
  .conf-fill{height:100%;border-radius:3px}

  .trg{margin-bottom:13px}
  .trg-h{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-4);margin-bottom:8px}
  .trg-item{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;line-height:1.4;margin-bottom:7px;color:var(--txt-2)}
  .trg-item .ic{font-size:11px;margin-top:1px}
  .trg-item.hit .ic{color:var(--pos)} .trg-item.miss .ic{color:var(--txt-4)}
  .trg-item a{color:var(--txt-3);text-decoration:underline;text-decoration-color:var(--line-2);text-underline-offset:2px}
  .counter{font-size:11.5px;line-height:1.5;color:var(--txt-2);background:rgba(255,90,106,.05);
    border:1px solid rgba(255,90,106,.2);border-radius:8px;padding:10px 12px;margin-bottom:15px}
  .counter b{color:var(--neg);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:5px}

  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .btn{padding:10px 8px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.04em;cursor:pointer;
    border:1px solid var(--line-2);background:var(--panel-2);color:var(--txt-2);text-align:center;transition:.14s}
  .btn:hover{border-color:var(--txt-3);color:var(--txt)}
  .btn.primary{background:var(--armed);border-color:var(--armed);color:#1a0a06}
  .btn.primary:hover{box-shadow:0 0 18px -4px var(--armed);color:#1a0a06}
  .btn.primary.tealv{background:var(--manage);border-color:var(--manage);color:#04130f}
  .btn.full{grid-column:1/-1}

  .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:15px}
  .pos-cell{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:var(--panel-2)}
  .pos-cell .k{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-4);margin-bottom:5px}
  .pos-cell .v{font-family:var(--mono);font-weight:700;font-size:15px}
  .exitby{display:flex;align-items:center;gap:10px;border:1px solid rgba(52,194,160,.3);border-radius:8px;
    padding:11px 13px;background:rgba(52,194,160,.05);margin-bottom:15px}
  .exitby .cd{font-family:var(--mono);font-weight:800;font-size:20px;color:var(--manage)}
  .exitby .x{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-3);line-height:1.4}

  .kbd{font-family:var(--mono);font-size:9.5px;color:var(--txt-4);border:1px solid var(--line);border-radius:4px;
    padding:1px 5px;background:var(--bg-2)}
  .kbhint{display:flex;gap:14px;align-items:center;color:var(--txt-4);font-size:10px}

  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>ALPHA&nbsp;DECK <small>// research cockpit</small></div>
    <nav class="nav">
      <a class="on">Board</a>
      <a class="stub">Workbench</a>
      <a class="stub">Scoreboard</a>
    </nav>
    <div class="spacer"></div>
    <div class="kbhint"><span><span class="kbd">↵</span> open</span><span><span class="kbd">esc</span> back</span></div>
    <span class="demo-pill">DEMO DATA</span>
    <span class="clock" id="clock">—</span>
  </div>

  <!-- DECISION QUEUE: the loud anti-forgetting surface -->
  <div class="dq">
    <div class="dq-label"><span class="pulse"></span>Decision Queue</div>
    <div class="dq-items" id="dq"></div>
  </div>

  <!-- BOARD -->
  <div class="board" id="board"></div>

  <!-- COCKPIT -->
  <div class="cockpit" id="cockpit">
    <div class="cp-top">
      <div class="back" onclick="closeCockpit()">← Board</div>
      <div class="cp-title" id="cpTitle"></div>
    </div>
    <div class="cp-body">
      <div class="cp-main" id="cpMain"></div>
      <div class="cp-rail" id="cpRail"></div>
    </div>
  </div>
</div>

<script>
/* ---------- sample data (illustrative; drawn from our psychedelics / datacenter threads) ---------- */
const COLORS={incubating:'--incub',warming:'--warm',armed:'--armed',managing:'--manage'};
const STATE_LABEL={incubating:'Incubating',warming:'Warming',armed:'Armed',managing:'Managing'};

const THESES=[
  /* ===== INCUBATING (dormant) ===== */
  {id:'rwa',state:'incubating',tk:'RWA',name:'Tokenized Equities / On-Chain Rails',
   desc:'Equities migrating on-chain; SEC innovation exemption live. Too early on specific picks — watching.',
   tags:['emerging-sector','infra'],fired:0,total:4,
   narrative:'Equity trading is moving onto crypto rails. The exemption + Nasdaq/NYSE filings are the regime tell. I don\u2019t want the tokens — I want the infra and exchanges that clear the volume. Parking until a name confirms.',
   basket:[
     {tk:'ONDO',role:'Institutional RWA infra',arch:'leader',met:'mkt $1.4B'},
     {tk:'COIN',role:'Exchange / settlement',arch:'leader',met:'mkt $62B'},
     {tk:'GLXY',role:'Tokenization / treasury',arch:'beta',met:'mkt $4.1B'}],
   evidence:[{typ:'NEWS',lbl:'SEC innovation exemption for tokenized stocks',dt:'May'},
     {typ:'8-K',lbl:'Nasdaq rule-change proposal — tokenized ETPs',dt:'Sep'}],

/* ---------- render board ---------- */
const COLS=['incubating','warming','armed','managing'];
const COLHINT={incubating:'quiet \u00b7 do not act',warming:'stirring',armed:'act now',managing:'in position'};
const board=document.getElementById('board');
COLS.forEach((state,ci)=>{
  const list=THESES.filter(t=>t.state===state);
  const col=document.createElement('div');
  col.className='col '+({incubating:'incub',warming:'warm',armed:'armed',managing:'manage'})[state];
  col.innerHTML=`<div class="col-head"><span class="swatch"></span><h2>${STATE_LABEL[state]}</h2>
    <span class="hint">${COLHINT[state]}</span><span class="n">${list.length}</span></div>
    <div class="col-body"></div>`;
  const body=col.querySelector('.col-body');
  list.forEach((t,i)=>{
    const c=document.createElement('div');
    c.className='card';c.style.animationDelay=(ci*0.06+i*0.05)+'s';
    c.onclick=()=>openCockpit(t.id);
    let foot='';
    if(state==='managing'){
      foot=`<div class="foot"><span class="pnl up">+${t.pnl}%</span>
        <span class="countchip">exit ${t.daysLeft}d</span></div>`;
    }else if(state==='armed'){
      foot=`<div class="foot"><span class="grade ${t.grade}">${t.grade.toUpperCase()}</span>
        ${pips(t.fired,t.total,state)}</div>
        <div class="call-flag"><span class="b"></span>CALL READY</div>`;
    }else{
      foot=`<div class="foot">${pips(t.fired,t.total,state)}</div>`;
    }
    c.innerHTML=`<div class="tk">${t.tk}</div><div class="nm">${t.name}</div>
      <div class="desc">${t.desc}</div>
      <div class="tags">${t.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div>
      ${foot}`;
    body.appendChild(c);
  });
  board.appendChild(col);
});
function pips(f,total,state){
  let p='';for(let i=0;i<total;i++)p+=`<span class="pip ${i<f?'on':''}"></span>`;
  return `<div class="readiness"><span style="color:var(--txt-4);font-size:10px">${f}/${total}</span><div class="pips">${p}</div></div>`;
}

/* ---------- decision queue (armed items only) ---------- */
const dq=document.getElementById('dq');
const armed=THESES.filter(t=>t.state==='armed');
if(armed.length){
  armed.forEach(t=>{
    const d=document.createElement('div');d.className='dq-item';d.onclick=()=>openCockpit(t.id);
    d.innerHTML=`<b>${t.tk}</b><span class="g grade ${t.grade}">${t.grade.toUpperCase()}</span>
      <span>${t.call.verdict} \u00b7 ${t.name}</span>`;
    dq.appendChild(d);
  });
}else{ dq.innerHTML='<span class="dq-empty">Nothing armed. Nothing to do. \u2713</span>'; }

/* ---------- cockpit ---------- */
const SHORT={incubating:'cc-incub',warming:'cc-warm',armed:'cc-armed',managing:'cc-manage'};
const VCLASS={incubating:'incub',warming:'warm',armed:'armed',managing:'manage'};
const ARCHLBL={leader:'Leader',beta:'High-beta',lotto:'Lotto',shovel:'Shovel'};

function openCockpit(id){
  const t=THESES.find(x=>x.id===id);
  document.getElementById('cpTitle').innerHTML=
    `<span class="tk" style="color:var(${COLORS[t.state]})">${t.tk}</span><h1>${t.name}</h1>
     <span class="state-badge" style="color:var(${COLORS[t.state]});background:color-mix(in srgb, var(${COLORS[t.state]}) 14%, transparent);border:1px solid color-mix(in srgb, var(${COLORS[t.state]}) 40%, transparent)">${STATE_LABEL[t.state]}</span>
     ${t.grade?`<span class="grade ${t.grade}">${t.grade.toUpperCase()}</span>`:''}`;

  /* main column */
  let main=`<div class="sect"><div class="sect-h">Narrative &amp; conviction</div>
      <div class="narrative">${t.narrative}<span class="by">\u2014 your notes, preserved</span></div></div>`;

  main+=`<div class="sect"><div class="sect-h">Basket \u00b7 the expression</div>
    <table class="basket"><tr><th>Ticker</th><th>Role</th><th>Archetype</th><th style="text-align:right">Detail</th></tr>
    ${t.basket.map(b=>`<tr><td class="tk">${b.tk}</td><td class="role">${b.role}</td>
      <td><span class="arch ${b.arch}">${ARCHLBL[b.arch]}</span></td><td class="met">${b.met}</td></tr>`).join('')}
    </table></div>`;

  if(t.evidence&&t.evidence.length){
    main+=`<div class="sect"><div class="sect-h">Evidence</div>
      ${t.evidence.map(e=>`<div class="ev"><span class="typ">${e.typ}</span><span class="lbl">${e.lbl}</span>
        <span class="dt">${e.dt}</span><span class="arrow">\u2197</span></div>`).join('')}</div>`;
  }
  if(t.catalysts&&t.catalysts.length){
    main+=`<div class="sect"><div class="sect-h">Catalyst calendar</div>
      ${t.catalysts.map(c=>{const soon=/^\d+d$/.test(c.when)||c.kind==='time-stop';
        return `<div class="cat ${soon?'soon':''}"><span class="when">${c.when}</span><span class="lbl">${c.lbl}</span><span class="kind">${c.kind}</span></div>`;}).join('')}</div>`;
  }
  main+=`<div class="sect"><div class="sect-h">Kill criteria</div>
    ${t.kill.map(k=>`<div class="kill">${k}</div>`).join('')}</div>`;
  document.getElementById('cpMain').innerHTML=main;

  /* rail: the call card */
  document.getElementById('cpRail').innerHTML=renderCall(t);
  document.getElementById('cockpit').classList.add('show');
}

function renderCall(t){
  const c=t.call,vc=VCLASS[t.state];
  let head={incubating:'Watch \u00b7 the gate',warming:'Readiness \u00b7 the gate',armed:'The Call',managing:'Position'}[t.state];
  let body=`<div class="verdict ${vc}">${c.verdict}</div><div class="vsub">${c.sub}</div>`;

  if(t.state==='managing'){
    body+=`<div class="pos-grid">
        <div class="pos-cell"><div class="k">Entry</div><div class="v">${c.pos.entry}</div></div>
        <div class="pos-cell"><div class="k">Current</div><div class="v">${c.pos.current}</div></div></div>
      <div class="exitby"><div class="cd">${c.pos.exitDays}d</div>
        <div class="x">Half-life exit-by<br>trail or take the gain</div></div>
      <div class="actions"><div class="btn full">Trail stop</div>
        <div class="btn primary tealv" style="grid-column:1/-1">Close \u00b7 take +${t.pnl}%</div></div>`;
    return `<div class="callcard ${SHORT[t.state]}"><div class="cc-head">${head}<span class="pnl up">+${t.pnl}%</span></div><div class="cc-body">${body}</div></div>`;
  }

  /* confidence (armed) */
  if(c.conf){
    const col=t.state==='armed'?'--armed':'--warm';
    body+=`<div class="conf"><div class="conf-row"><span>Confidence</span><span style="color:var(${col})">${c.conf}%</span></div>
      <div class="conf-bar"><div class="conf-fill" style="width:${c.conf}%;background:var(${col})"></div></div></div>`;
  }
  /* triggers */
  body+=`<div class="trg"><div class="trg-h">Triggers fired</div>`;
  (c.fired||[]).forEach(f=>body+=`<div class="trg-item hit"><span class="ic">\u25c9</span><span>${f} <a>\u2197 source</a></span></div>`);
  body+=`</div>`;
  if(c.missing&&c.missing.length){
    body+=`<div class="trg"><div class="trg-h">Still missing</div>`;
    c.missing.forEach(m=>body+=`<div class="trg-item miss"><span class="ic">\u25cb</span><span>${m}</span></div>`);
    body+=`</div>`;
  }
  if(c.counter) body+=`<div class="counter"><b>Counter-case</b>${c.counter}</div>`;

  /* actions vary by state */
  if(t.state==='armed'){
    body+=`<div class="actions"><div class="btn primary">Act</div><div class="btn">Override</div><div class="btn">Snooze</div></div>`;
  }else if(t.state==='warming'){
    body+=`<div class="actions"><div class="btn">Flip (small)</div><div class="btn">Override \u2014 enter early</div></div>
      <div style="font-size:10px;color:var(--txt-4);margin-top:9px;line-height:1.5">Override logged &amp; scored. The gate isn\u2019t a block \u2014 it\u2019s the platform withholding its go.</div>`;
  }else{
    body+=`<div class="actions"><div class="btn full">Override \u2014 enter anyway (logged)</div></div>
      <div style="font-size:10px;color:var(--txt-4);margin-top:9px;line-height:1.5">No nag while incubating. This is the vault \u2014 it waits so you don\u2019t move too early.</div>`;
  }
  return `<div class="callcard ${SHORT[t.state]}"><div class="cc-head">${head}</div><div class="cc-body">${body}</div></div>`;
}

function closeCockpit(){document.getElementById('cockpit').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCockpit();});

/* clock */
function tick(){const d=new Date();document.getElementById('clock').textContent=
  d.toLocaleTimeString('en-US',{hour12:false})+' ET';}
tick();setInterval(tick,1000);
</script>
